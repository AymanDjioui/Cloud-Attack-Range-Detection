# Docker Compose - SOC VM Orchestration (AI Engine + AI Panel + PostgreSQL)
services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    container_name: ai_insights_db
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: insights_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ai_network
      - wazuh-net
    restart: unless-stopped

  # ── AI Analysis Engine (Python) ──────────────────────────────
  # Polls Wazuh API → Gemini AI analysis → stores in PostgreSQL
  ai-engine:
    container_name: python_ai_engine
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      - WAZUH_INDEXER=https://wazuh.indexer:9200
      - INDEXER_USER=admin
      - INDEXER_PASS=SecretPassword
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=gemini-2.0-flash
      - DATABASE_URL=postgresql://admin:admin_password@db:5432/insights_db
      - POLL_INTERVAL=60
      - MIN_RULE_LEVEL=6
    networks:
      - ai_network
      - wazuh-net
    restart: unless-stopped

  # ── AI Insights Web Panel (Flask + HTML) ─────────────────────
  # Dashboard accessible at http://192.168.100.10:3000
  ai-panel:
    container_name: ai_insights_panel
    build:
      context: ./ai-panel
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:admin_password@db:5432/insights_db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    networks:
      - ai_network
    restart: unless-stopped

volumes:
  pgdata:

networks:
  ai_network:
    driver: bridge
  wazuh-net:
    external: true
    name: single-node_default
